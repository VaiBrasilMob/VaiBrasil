<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaiBrasil - O App da Cidade</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Banner Impactante -->
  <section class="relative text-white text-center py-24 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-r from-green-600 via-yellow-400 to-blue-700"></div>

    <div class="relative z-10 flex flex-col items-center">
      <img src="vaibrasil.png" class="w-40 md:w-56 mb-6 drop-shadow-2xl" />
      <h1 class="text-5xl font-extrabold mb-4">O APP DA CIDADE CHEGOU</h1>
      <p class="text-xl">Igaraçu do Tietê agora tem o seu próprio app</p>
    </div>
  </section>

  <!-- Seção Conversão -->
  <section class="text-center py-16 px-4">
    <h2 class="text-3xl font-bold mb-8">Baixe agora o VaiBrasil</h2>

    <!-- Benefícios em quadros -->
    <div class="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-10">
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <p class="font-semibold text-lg">⚡ Corridas rápidas</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <p class="font-semibold text-lg">💰 Preço justo</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <p class="font-semibold text-lg">🚗 Motoristas da sua cidade</p>
      </div>
    </div>

    <!-- Botões abaixo dos quadros -->
    <div class="flex justify-center gap-4">
      <a href="#" class="bg-green-600 text-white px-6 py-3 rounded-2xl shadow-xl hover:scale-110 transition">📱 Android</a>
      <a href="#" class="bg-black text-white px-6 py-3 rounded-2xl shadow-xl hover:scale-110 transition">🍎 iOS</a>
      <a href="#" class="bg-yellow-400 text-black px-6 py-3 rounded-2xl shadow-xl hover:scale-110 transition">🚗 Motorista</a>
    </div>
  </section>

  <!-- Rodapé -->
  <footer class="bg-gray-900 text-white text-center py-10 mt-10">
    <div class="flex justify-center gap-6 mb-4">
      <a href="#" class="hover:underline">Facebook</a>
      <a href="#" class="hover:underline">Instagram</a>
      <a href="#" class="hover:underline">Termos de Uso</a>
      <a href="#" class="hover:underline">Privacidade</a>
    </div>
    <p class="text-sm">© 2026 VaiBrasil</p>
  </footer>

</body>
</html>
